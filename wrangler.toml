name = "docvault"
main = ".vercel/output/static/_worker.js"
compatibility_date = "2024-05-02"
compatibility_flags = ["nodejs_compat"]

[vars]
# Add your environment variables here or in the Cloudflare Dashboard
# DATABASE_URL = "..."
# DIRECT_URL = "..."
# BLOB_READ_WRITE_TOKEN = "..."
# NEXTAUTH_SECRET = "..."
# NEXTAUTH_URL = "..."

[[kv_namespaces]]
# Optional: If you want to use KV for sessions or caching
# binding = "DOCVAULT_KV"
# id = "..."

[site]
bucket = ".vercel/output/static"
